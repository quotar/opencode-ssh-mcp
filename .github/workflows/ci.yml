name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.21.x, 1.22.x]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Verify Go version
      run: go version

    - name: Download dependencies
      run: go mod download

    - name: Lint
      run: |
        go vet ./...
        # If you're using golangci-lint:
        # go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        # golangci-lint run

    - name: Test
      run: go test -v ./...

    - name: Build
      run: go build -v .